name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        env:
          JWT_SECRET: shopworthy-secret-2024
          API_SECRET: sw-internal-2024-secret

      - name: Verify app starts
        run: |
          echo "API secret is: ${{ secrets.JWT_SECRET }}"
          timeout 5 node src/index.js || true
        env:
          JWT_SECRET: shopworthy-secret-2024
          DB_PATH: ./data/shopworthy.db
